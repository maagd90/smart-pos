server:
  port: ${SERVER_PORT:8104}

spring:
  application:
    name: catalog-pricing-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catalog_pricing_db}
    username: ${SPRING_DATASOURCE_USERNAME:smartpos}
    password: ${SPRING_DATASOURCE_PASSWORD:smartpos}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      group-id: catalog-pricing-service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
