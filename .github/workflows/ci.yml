name: Platform CI

on:
  push:
    branches: ["main", "feature/**", "milestone-*", "copilot/**", "cursor/**"]
  pull_request:
    branches: ["main", "feature/**", "copilot/**", "cursor/**"]

permissions:
  contents: read

jobs:
  java-build:
    name: Java Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build and test all modules
        run: mvn -q test

  web-client-build:
    name: Web Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - name: Install and build
        working-directory: web-client
        run: |
          npm ci
          npm run build

  mobile-client-typecheck:
    name: Mobile Client Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile-client/package-lock.json
      - name: Install and type check
        working-directory: mobile-client
        run: |
          npm ci
          npx tsc --noEmit

  docker-compose-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: |
          cp .env.example .env
          docker compose config

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [java-build, docker-compose-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Set up environment
        run: cp .env.example .env
      - name: Build and start services
        run: docker compose up --build -d
      - name: Run smoke tests
        run: ./scripts/smoke-test.sh
      - name: Run e2e business smoke tests
        run: ./scripts/e2e-smoke-test.sh
      - name: Print logs on failure
        if: failure()
        run: docker compose logs --tail=100
      - name: Tear down
        if: always()
        run: docker compose down -v
