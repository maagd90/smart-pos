version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-pos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartpos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-pos-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/smartpos
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=7d
      - AI_ENABLED=${AI_ENABLED:-false}
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED:-false}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - DYNAMIC_PRICING_ENABLED=${DYNAMIC_PRICING_ENABLED:-false}
      - INVENTORY_FORECASTING_ENABLED=${INVENTORY_FORECASTING_ENABLED:-false}
      - LLM_TYPE=${LLM_TYPE:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama2}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-}
      - TWILIO_SMS_FROM=${TWILIO_SMS_FROM:-}
      - FRONTEND_URL=http://localhost:5173
      - ADMIN_PORTAL_ENABLED=true
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-admin-secret}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-pos-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:3000/api/v1
      - VITE_SOCKET_URL=http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
