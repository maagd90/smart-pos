      interval: 5s
      timeout: 3s
      retries: 10

  reporting-finance-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reporting_finance_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d reporting_finance_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Platform Services ---

  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    depends_on:
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- Domain Services (not exposed on host, accessed only through gateway) ---

  identity-access-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: services/identity-access-service
    depends_on:
      identity-access-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8101
      SPRING_DATASOURCE_URL: jdbc:postgresql://identity-access-db:5432/identity_access_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
    expose:
      - "8101"

  tenant-admin-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: services/tenant-admin-service
    depends_on:
