server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # --- Identity & Access ---
        - id: identity-auth
          uri: http://identity-access-service:8101
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${AUTH_RATE_LIMIT_REPLENISH:10}
                redis-rate-limiter.burstCapacity: ${AUTH_RATE_LIMIT_BURST:20}
                key-resolver: "#{@userOrIpKeyResolver}"
        - id: identity-users
          uri: http://identity-access-service:8101
          order: 0
          predicates:
            - Path=/api/v1/accounts/*/users/**

        # --- Tenant & Admin ---
        - id: tenant-accounts
          uri: http://tenant-admin-service:8102
          order: 100
          predicates:
            - Path=/api/v1/accounts/**
        - id: tenant-stores
          uri: http://tenant-admin-service:8102
          predicates:
            - Path=/api/v1/stores/{storeId}
            - Method=GET,PUT,DELETE

        # --- Billing & Subscription ---
        - id: billing
          uri: http://billing-subscription-service:8103
          predicates:
            - Path=/api/v1/billing/**
        - id: subscriptions
          uri: http://billing-subscription-service:8103
          predicates:
            - Path=/api/v1/subscriptions/**

        # --- Catalog & Pricing ---
        - id: catalog-pricing
          uri: http://catalog-pricing-service:8104
          predicates:
            - Path=/api/v1/stores/*/products/**

        # --- Inventory ---
        - id: inventory
          uri: http://inventory-service:8105
          predicates:
            - Path=/api/v1/stores/*/inventory/**

        # --- Sales ---
        - id: sales
          uri: http://sales-service:8106
          predicates:
            - Path=/api/v1/stores/*/sales/**

        # --- Refunds ---
        - id: refunds
          uri: http://refunds-service:8107
          predicates:
            - Path=/api/v1/stores/*/refunds/**

        # --- Customers & Privacy ---
        - id: customers-privacy
          uri: http://customers-privacy-service:8108
          predicates:
            - Path=/api/v1/stores/*/customers/**

        # --- AI Deals ---
        - id: ai-deals-store
          uri: http://ai-deals-service:8109
          predicates:
            - Path=/api/v1/stores/*/deals/**
        - id: ai-deals-global
          uri: http://ai-deals-service:8109
          predicates:
            - Path=/api/v1/deals/**

        # --- Notifications & Approvals ---
        - id: approvals
          uri: http://notifications-approvals-service:8110
          predicates:
            - Path=/api/v1/stores/*/approvals/**
        - id: notifications
          uri: http://notifications-approvals-service:8110
          predicates:
            - Path=/api/v1/stores/*/notifications/**

        # --- Messaging & Delivery ---
        - id: messaging
          uri: http://messaging-delivery-service:8111
          predicates:
            - Path=/api/v1/stores/*/messages/**

        # --- Reporting & Finance ---
        - id: reports
          uri: http://reporting-finance-service:8112
          predicates:
            - Path=/api/v1/stores/*/reports/**
        - id: expenses
          uri: http://reporting-finance-service:8112
          predicates:
            - Path=/api/v1/stores/*/expenses/**

        # --- Health routes for each service (accessible without auth) ---
        # NOTE: These must be defined BEFORE the platform-admin catch-all route.
        - id: health-identity
          uri: http://identity-access-service:8101
          order: -100
          predicates:
            - Path=/api/v1/platform/health/identity-access
          filters:
            - RewritePath=/api/v1/platform/health/identity-access, /api/v1/health
        - id: health-tenant
          uri: http://tenant-admin-service:8102
          order: -100
          predicates:
            - Path=/api/v1/platform/health/tenant-admin
          filters:
            - RewritePath=/api/v1/platform/health/tenant-admin, /api/v1/health
        - id: health-billing
          uri: http://billing-subscription-service:8103
          order: -100
          predicates:
            - Path=/api/v1/platform/health/billing-subscription
          filters:
            - RewritePath=/api/v1/platform/health/billing-subscription, /api/v1/health
        - id: health-catalog
          uri: http://catalog-pricing-service:8104
          order: -100
          predicates:
            - Path=/api/v1/platform/health/catalog-pricing
          filters:
            - RewritePath=/api/v1/platform/health/catalog-pricing, /api/v1/health
        - id: health-inventory
          uri: http://inventory-service:8105
          order: -100
          predicates:
            - Path=/api/v1/platform/health/inventory
          filters:
            - RewritePath=/api/v1/platform/health/inventory, /api/v1/health
        - id: health-sales
          uri: http://sales-service:8106
          order: -100
          predicates:
            - Path=/api/v1/platform/health/sales
          filters:
            - RewritePath=/api/v1/platform/health/sales, /api/v1/health
        - id: health-refunds
          uri: http://refunds-service:8107
          order: -100
          predicates:
            - Path=/api/v1/platform/health/refunds
          filters:
            - RewritePath=/api/v1/platform/health/refunds, /api/v1/health
        - id: health-customers
          uri: http://customers-privacy-service:8108
          order: -100
          predicates:
            - Path=/api/v1/platform/health/customers-privacy
          filters:
            - RewritePath=/api/v1/platform/health/customers-privacy, /api/v1/health
        - id: health-deals
          uri: http://ai-deals-service:8109
          order: -100
          predicates:
            - Path=/api/v1/platform/health/ai-deals
          filters:
            - RewritePath=/api/v1/platform/health/ai-deals, /api/v1/health
        - id: health-approvals
          uri: http://notifications-approvals-service:8110
          order: -100
          predicates:
            - Path=/api/v1/platform/health/notifications-approvals
          filters:
            - RewritePath=/api/v1/platform/health/notifications-approvals, /api/v1/health
        - id: health-messaging
          uri: http://messaging-delivery-service:8111
          order: -100
          predicates:
            - Path=/api/v1/platform/health/messaging-delivery
          filters:
            - RewritePath=/api/v1/platform/health/messaging-delivery, /api/v1/health
        - id: health-reporting
          uri: http://reporting-finance-service:8112
          order: -100
          predicates:
            - Path=/api/v1/platform/health/reporting-finance
          filters:
            - RewritePath=/api/v1/platform/health/reporting-finance, /api/v1/health

        # --- Platform Admin (catch-all, lowest priority) ---
        - id: platform-admin
          uri: http://tenant-admin-service:8102
          order: 1000
          predicates:
            - Path=/api/v1/platform/**

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 5

gateway:
  jwt:
    secret: ${JWT_SECRET:change-me-at-least-32-characters-long}
    issuer: ${JWT_ISSUER:smart-pos-platform}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
